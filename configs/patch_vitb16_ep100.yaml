data:
  batch_size: 32
  crop_size: 256
  crop_scale: [0.3, 1.0]
  num_workers: 4
  pin_mem: true
  data_dir: /tmp/fairvision_data/data
  num_slices: 32
  color_jitter_strength: 0.0
  use_color_distortion: false
  use_gaussian_blur: false
  use_horizontal_flip: false
mask:
  patch_size: 16
  num_enc_masks: 1
  num_pred_masks: 4
  enc_mask_scale: [0.85, 1.0]
  pred_mask_scale: [0.15, 0.2]
  aspect_ratio: [0.75, 1.5]
  allow_overlap: false
  min_keep: 10
meta:
  model_name: vit_base
  pred_depth: 6
  pred_emb_dim: 384
  use_bfloat16: false
  load_checkpoint: false
  read_checkpoint: null
optimization:
  epochs: 100
  lr: 0.0005
  start_lr: 0.0001
  final_lr: 0.000001
  warmup: 15
  weight_decay: 0.04
  final_weight_decay: 0.4
  ema: [0.996, 1.0]
  ipe_scale: 1.0
  patience: 15
logging:
  folder: /tmp/ijepa_outputs/patch_vitb16_ep100
  write_tag: jepa_patch
